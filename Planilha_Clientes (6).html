<html lang="pt-BR">
<head>

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Arial, sans-serif; background: #1a1a1a; color: #fff; min-height: 100vh; }

  /* ── LOGIN ── */
  #login-screen {
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; padding: 20px;
  }
  .login-box {
    background: #222; border: 1px solid #444; border-radius: 10px;
    padding: 36px 32px; width: 100%; max-width: 360px;
    box-shadow: 0 8px 32px rgba(0,0,0,.5);
  }
  .login-logo { text-align: center; margin-bottom: 24px; }
  .login-logo div:first-child { font-size: 38px; margin-bottom: 6px; }
  .login-logo div:last-child { font-size: 16px; font-weight: bold; color: #4caf50; letter-spacing: 1px; }
  .login-field { margin-bottom: 16px; }
  .login-field label { display: block; font-size: 11px; color: #aaa; margin-bottom: 6px; text-transform: uppercase; letter-spacing: .5px; }
  .login-field input {
    width: 100%; background: #111; border: 1.5px solid #444; border-radius: 6px;
    padding: 11px 14px; color: #fff; font-size: 14px; outline: none; transition: border .2s;
  }
  .login-field input:focus { border-color: #4caf50; }
  .login-btn {
    width: 100%; padding: 12px; background: #2e7d32; color: #fff; border: none;
    border-radius: 6px; font-size: 14px; font-weight: bold; cursor: pointer;
    margin-top: 6px; transition: background .2s;
  }
  .login-btn:hover { background: #1b5e20; }
  .login-btn:disabled { opacity: .6; cursor: not-allowed; }
  .login-error { color: #ef5350; font-size: 13px; text-align: center; margin-top: 12px; min-height: 18px; }

  /* ── APP ── */
  #app-screen { display: none; padding: 16px; }

  .top-bar { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; margin-bottom: 16px; }

  .date-box { background: #111; border: 1px solid #444; border-radius: 4px; text-align: center; min-width: 120px; }
  .date-box .label { background: #222; padding: 5px 14px; font-weight: bold; font-size: 12px; border-bottom: 1px solid #444; }
  .date-box .value { padding: 5px 14px; font-size: 13px; font-weight: bold; }

  .situacao-block { display: flex; gap: 0; border-radius: 4px; overflow: hidden; border: 1px solid #444; }
  .situacao-label { background: #111; display: flex; align-items: center; }
  .situacao-label .inner { padding: 0 14px; }
  .situacao-label .s-title { font-weight: bold; font-size: 12px; text-align: center; border-bottom: 1px solid #333; padding: 5px 0; }
  .situacao-label .s-sub { font-size: 12px; text-align: center; padding: 5px 0; color: #aaa; }
  .stat-item { display: flex; flex-direction: column; align-items: center; justify-content: center; min-width: 80px; }
  .stat-item .s-label { font-size: 11px; font-weight: bold; padding: 5px 12px; width: 100%; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.2); }
  .stat-item .s-count { font-size: 20px; font-weight: bold; padding: 4px 12px; }
  .stat-item.vencido  { background: #b71c1c; }
  .stat-item.noprazo  { background: #1b5e20; }
  .stat-item.pago     { background: #0d47a1; }
  .stat-item.vencendo { background: #e65100; }
  .stat-item.ativos   { background: #37474f; border-left: 2px solid #90a4ae; }

  .top-right { display:flex; gap:8px; align-items:center; margin-left:auto; flex-wrap:wrap; }

  .sync-badge { display:flex;align-items:center;gap:6px;background:#1a2a1a;border:1px solid #2e7d32;border-radius:4px;padding:6px 12px;font-size:12px;color:#66bb6a;cursor:pointer;transition:filter .2s; }
  .sync-badge:hover { filter:brightness(1.2); }
  .sync-badge svg { width:14px;height:14px;flex-shrink:0; }

  .logout-btn { display:flex;align-items:center;gap:5px;background:#2a1a1a;border:1px solid #7d2e2e;border-radius:4px;padding:6px 12px;font-size:12px;color:#ef9a9a;cursor:pointer;transition:filter .2s; }
  .logout-btn:hover { filter:brightness(1.2); }

  .user-badge { font-size:12px;color:#aaa;background:#222;border:1px solid #444;border-radius:4px;padding:5px 12px; }

  .buttons-row { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 14px; }
  .btn { padding: 10px 22px; border: none; border-radius: 5px; font-size: 13px; font-weight: bold; cursor: pointer; letter-spacing: 0.5px; transition: filter 0.15s, transform 0.1s; }
  .btn:hover { filter: brightness(1.15); transform: translateY(-1px); }
  .btn:active { transform: translateY(0); }
  .btn-add    { background: #1565c0; color: #fff; }
  .btn-del    { background: #b71c1c; color: #fff; }
  .btn-renew  { background: #2e7d32; color: #fff; }
  .btn-export { background: #333; color: #ccc; border: 1px solid #555; }

  .table-wrap { overflow-x: auto; border-radius: 6px; }
  table { width: 100%; border-collapse: collapse; min-width: 760px; }
  thead th { background: #111; color: #fff; font-size: 11px; font-weight: bold; padding: 8px 10px; text-align: center; border: 1px solid #333; white-space: nowrap; }
  tbody tr:nth-child(odd)  { background: #2a2a2a; }
  tbody tr:nth-child(even) { background: #333; }
  tbody tr:hover { background: #3d3d3d; }
  tbody td { font-size: 12px; padding: 7px 10px; text-align: center; border: 1px solid #3a3a3a; color: #eee; }
  td.status { font-weight: bold; font-size: 12px; }
  td.status.vencido  { color: #ff5252; }
  td.status.vencendo { color: #ffa726; }
  td.status.noprazo  { color: #66bb6a; }
  td.status.pago     { color: #42a5f5; }
  td.dias.negative   { color: #ff7070; }
  td.dias.positive   { color: #aaffaa; }

  .btn-edit-row {
    display: inline-flex; align-items: center; gap: 4px;
    background: #fb8c00; color: #fff; border: none; border-radius: 4px;
    padding: 5px 10px; font-size: 11px; font-weight: bold; cursor: pointer;
    white-space: nowrap; transition: filter .15s;
  }
  .btn-edit-row:hover { filter: brightness(1.2); }
  .btn-edit-row svg { width: 13px; height: 13px; flex-shrink: 0; }

  .btn-wa {
    display: inline-flex; align-items: center; gap: 4px;
    background: #128C7E; color: #fff; border: none; border-radius: 4px;
    padding: 5px 10px; font-size: 11px; font-weight: bold; cursor: pointer;
    white-space: nowrap; transition: filter .15s; text-decoration: none;
  }
  .btn-wa:hover { filter: brightness(1.2); }
  .btn-wa svg { width: 13px; height: 13px; flex-shrink: 0; }
  .btn-wa.vencido  { background: #b71c1c; }
  .btn-wa.vencendo { background: #e65100; }
  .btn-wa.noprazo  { background: #1b5e20; }
  .btn-wa.pago     { background: #0d47a1; }

  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 100; align-items: center; justify-content: center; }
  .modal-overlay.active { display: flex; }
  .modal { background: #222; border: 1px solid #555; border-radius: 8px; padding: 24px; min-width: 340px; max-width: 95vw; }
  .modal h2 { font-size: 16px; margin-bottom: 18px; color: #fff; border-bottom: 1px solid #444; padding-bottom: 10px; }
  .form-group { margin-bottom: 14px; }
  .form-group label { display: block; font-size: 12px; color: #aaa; margin-bottom: 5px; }
  .form-group input { width: 100%; background: #111; border: 1px solid #555; border-radius: 4px; padding: 8px 10px; color: #fff; font-size: 13px; outline: none; }
  .form-group input:focus { border-color: #1565c0; }
  .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 18px; }
  .modal-actions .btn { padding: 8px 20px; font-size: 13px; }
  .btn-cancel { background: #444; color: #fff; }

  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #1b5e20; color: #fff; padding: 12px 28px; border-radius: 6px; font-size: 14px; font-weight: bold; z-index: 200; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
  .toast.show { opacity: 1; }
  .toast.error { background: #b71c1c; }

  .search-bar { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
  .search-bar input { background: #2a2a2a; border: 1px solid #444; border-radius: 4px; padding: 7px 12px; color: #fff; font-size: 13px; outline: none; flex: 1; max-width: 280px; }
  .search-bar input:focus { border-color: #1565c0; }
  .search-bar label { font-size: 12px; color: #aaa; }
  .row-count { font-size: 12px; color: #888; margin-left: auto; }

const sb = supabase.createClient(SUPA_URL, SUPA_KEY);

let currentUser = null;

// ── LOGIN ──────────────────────────────────────────────────────────────────
async function doLogin() {
  const username = document.getElementById('login-user').value.trim().toLowerCase();
  const pass     = document.getElementById('login-pass').value;
  const err      = document.getElementById('login-error');
  const btn      = document.getElementById('login-btn');
  err.textContent = '';
  if (!username || !pass) { err.textContent = 'Preencha usuário e senha.'; return; }
  btn.disabled = true; btn.textContent = 'Entrando...';
  try {
    const { data, error } = await sb.from('users').select('*').eq('username', username).single();
    if (error || !data) { err.textContent = 'Usuário não encontrado.'; return; }
    if (data.password !== btoa(pass)) { err.textContent = 'Senha incorreta.'; return; }
    currentUser = data;
    document.getElementById('user-label').textContent = data.name || data.username;
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app-screen').style.display = 'block';
    setToday();
    renderTable();
  } catch(e) {
    err.textContent = 'Erro de conexão.';
  } finally {
    btn.disabled = false; btn.textContent = 'ENTRAR';
  }
}

function doLogout() {
  currentUser = null;
  document.getElementById('login-user').value = '';
  document.getElementById('login-pass').value = '';
  document.getElementById('login-error').textContent = '';
  document.getElementById('app-screen').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
}

function getMsgWhats(cli, status, dias, vencimento) {
  if (status === 'vencido')
    return `Olá *${cli}*! ⚠️\nSeu plano *venceu há ${Math.abs(dias)} dias* (${vencimento}).\nPor favor, entre em contato para regularizar. Obrigado! 🙏`;
  if (status === 'vencendo')
    return `Olá *${cli}*! ⏰\nSeu plano está *vencendo em ${dias} dia(s)* (${vencimento}).\nRenove agora para não perder o acesso! 😊`;
  if (status === 'noprazo')
    return `Olá *${cli}*! 😊\nSeu plano está *ativo até ${vencimento}* (${dias} dias restantes).\nQualquer dúvida, estamos à disposição!`;
  return `Olá *${cli}*! 🎉\nSeu plano está *pago e ativo até ${vencimento}*.\nObrigado pela confiança! 😊`;
}

// ── SINCRONIZAR ────────────────────────────────────────────────────────────
async function syncFromGerenciador() {
  const lbl = document.getElementById('sync-label');
  lbl.textContent = 'Sincronizando...';
  try {
    const { data, error } = await sb.from('clients').select('*');
    if (error) throw error;
    if (!data || data.length === 0) { showToast('Nenhum cliente no Gerenciador.', true); lbl.textContent = 'Sincronizar com Gerenciador'; return; }
    let adicionados = 0, atualizados = 0;
    data.forEach((c, i) => {
      let dt = '';
      if (c.due) { const p = c.due.split('-'); if (p.length===3) dt=`${p[2]}/${p[1]}/${p[0]}`; }
      const phone = (c.phone||'').replace(/\D/g,'');
      const idx = clientes.findIndex(x => x.cli === (c.name||'').toUpperCase() || (x._gpcId && x._gpcId===c.id));
      if (idx !== -1) {
        if (dt) { clientes[idx].dt = dt; atualizados++; }
        if (phone) clientes[idx].phone = phone;
        clientes[idx]._gpcId = c.id;
      } else {
        clientes.push({ id: Math.abs(hashCode(c.id||String(i)))%999999+100000, resp:(c.user_username||'GPC').toUpperCase(), cli:(c.name||'SEM NOME').toUpperCase(), dt: dt||formatDate(new Date()), prazo:30, phone, _gpcId:c.id });
        adicionados++;
      }
    });
    clientes.sort((a,b) => a.cli.localeCompare(b.cli));
    renderTable();
    lbl.textContent = 'Sincronizado ✓';
    showToast(`✅ ${atualizados} atualizados, ${adicionados} novos.`);
    setTimeout(()=>{ lbl.textContent='Sincronizar com Gerenciador'; }, 3000);
  } catch(e) {
    showToast('Erro ao sincronizar.', true);
    lbl.textContent = 'Sincronizar com Gerenciador';
  }
}

function hashCode(str) {
  let h=0; for(let i=0;i<str.length;i++) h=(Math.imul(31,h)+str.charCodeAt(i))|0; return Math.abs(h);
}

// ── UTILS ──────────────────────────────────────────────────────────────────
function parseDate(s) {
  if (!s) return null;
  const [d,m,y] = s.split('/');
  if (!d||!m||!y) return null;
  return new Date(parseInt(y), parseInt(m)-1, parseInt(d));
}
function formatDate(date) {
  if (!date) return '';
  return `${String(date.getDate()).padStart(2,'0')}/${String(date.getMonth()+1).padStart(2,'0')}/${date.getFullYear()}`;
}
function daysDiff(dateStr) {
  const dt = parseDate(dateStr); if (!dt) return null;
  const today = new Date(); today.setHours(0,0,0,0);
  return Math.round((dt-today)/86400000);
}
function getVencimento(dt, prazo) {
  const d = parseDate(dt); if (!d) return '';
  d.setDate(d.getDate()+parseInt(prazo)); return formatDate(d);
}
function getStatus(dias) {
  if (dias===null) return {label:'', cls:''};
  if (dias<0)   return {label:'VENCIDO',  cls:'vencido'};
  if (dias<=3)  return {label:'VENCENDO', cls:'vencendo'};
  if (dias<=30) return {label:'NO PRAZO', cls:'noprazo'};
  return            {label:'PAGO',     cls:'pago'};
}

// ── RENDER ─────────────────────────────────────────────────────────────────
function renderTable() {
  const q = (document.getElementById('search-input').value||'').toLowerCase();
  const tbody = document.getElementById('table-body');
  let counts = {vencido:0, noprazo:0, pago:0, vencendo:0, ativos:0};

  clientes.forEach(c => {
    const venc = getVencimento(c.dt, c.prazo);
    const dias = daysDiff(venc);
    const st = getStatus(dias);
    if (st.cls) counts[st.cls]++;
    if (dias !== null && dias >= 0) counts.ativos++;
  });

  document.getElementById('cnt-ativos').textContent  = counts.ativos;
  document.getElementById('cnt-vencido').textContent  = counts.vencido;
  document.getElementById('cnt-noprazo').textContent  = counts.noprazo;
  document.getElementById('cnt-pago').textContent     = counts.pago;
  document.getElementById('cnt-vencendo').textContent = counts.vencendo;

  const filtered = q ? clientes.filter(c =>
    String(c.id).includes(q) || c.cli.toLowerCase().includes(q) || c.resp.toLowerCase().includes(q)
  ) : clientes;

  document.getElementById('row-count').textContent = `${filtered.length} cliente(s)`;

  tbody.innerHTML = filtered.map(c => {
    const venc = getVencimento(c.dt, c.prazo);
    const dias = daysDiff(venc);
    const st = getStatus(dias);
    const diasCls = dias!==null ? (dias<0?'negative':'positive') : '';
    const diasStr = dias!==null ? (dias<0?dias:'+'+dias) : '';
    const phone = (c.phone||'').replace(/\D/g,'');
    let waBtnHtml = '';
    if (phone) {
      const msg = getMsgWhats(c.cli, st.cls, dias, venc);
      const label = st.cls==='vencido'?'Cobrar': st.cls==='vencendo'?'Avisar': st.cls==='noprazo'?'Lembrar':'Contato';
      waBtnHtml = `<a href="https://wa.me/55${phone}?text=${encodeURIComponent(msg)}" target="_blank" class="btn-wa ${st.cls}">${WA_ICON} ${label}</a>`;
    } else {
      waBtnHtml = `<span style="color:#555;font-size:11px">Sem número</span>`;
    }
    const realIdx = clientes.indexOf(c);
    const EDIT_ICON = `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04a1 1 0 000-1.41l-2.34-2.34a1 1 0 00-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>`;
    return `<tr>
      <td>${c.id}</td><td>${c.resp}</td><td>${c.cli}</td>
      <td>${c.dt}</td><td>${c.prazo}</td><td>${venc}</td>
      <td class="dias ${diasCls}">${diasStr}</td>
      <td class="status ${st.cls}">${st.label}</td>
      <td>${waBtnHtml}</td>
      <td><button class="btn-edit-row" onclick="openEdit(${realIdx})">${EDIT_ICON} Editar</button></td>
    </tr>`;
  }).join('');
}

function setToday() {
  document.getElementById('today-date').textContent = formatDate(new Date());
}

// ── MODAIS ─────────────────────────────────────────────────────────────────
function openModal(type) {
  if (type==='add') {
    ['add-id','add-cli','add-dt','add-phone'].forEach(id=>document.getElementById(id).value='');
    document.getElementById('add-resp').value='EDUARDO';
    document.getElementById('add-prazo').value='30';
  } else if (type==='del') {
    document.getElementById('del-id').value='';
    document.getElementById('del-preview').textContent='';
  } else {
    document.getElementById('ren-id').value='';
    document.getElementById('ren-dt').value='';
    document.getElementById('ren-prazo').value='30';
    document.getElementById('ren-preview').textContent='';
  }
  document.getElementById(`modal-${type}`).classList.add('active');
  setTimeout(()=>{ const f=document.querySelector(`#modal-${type} input`); if(f) f.focus(); }, 50);
}
function closeModal(type) { document.getElementById(`modal-${type}`).classList.remove('active'); }
document.querySelectorAll('.modal-overlay').forEach(el=>{
  el.addEventListener('click', e=>{ if(e.target===el) el.classList.remove('active'); });
});

document.getElementById('del-id').addEventListener('input', function() {
  const id=parseInt(this.value);
  const c=clientes.find(c=>c.id===id);
  document.getElementById('del-preview').textContent = c?`Encontrado: ${c.cli} (${c.resp})`:'';
});

function addCliente() {
  const id=parseInt(document.getElementById('add-id').value);
  const resp=document.getElementById('add-resp').value.trim().toUpperCase();
  const cli=document.getElementById('add-cli').value.trim().toUpperCase();
  const dt=document.getElementById('add-dt').value.trim();
  const prazo=parseInt(document.getElementById('add-prazo').value)||30;
  const phone=document.getElementById('add-phone').value.trim().replace(/\D/g,'');
  if (!id||!resp||!cli||!dt){showToast('Preencha todos os campos.',true);return;}
  if (!parseDate(dt)){showToast('Data inválida. Use DD/MM/AAAA.',true);return;}
  if (clientes.find(c=>c.id===id)){showToast(`ID ${id} já existe.`,true);return;}
  clientes.push({id,resp,cli,dt,prazo,phone});
  clientes.sort((a,b)=>a.cli.localeCompare(b.cli));
  closeModal('add'); renderTable(); showToast(`Cliente "${cli}" adicionado!`);
}

function delCliente() {
  const id=parseInt(document.getElementById('del-id').value);
  const idx=clientes.findIndex(c=>c.id===id);
  if (idx===-1){showToast(`ID ${id} não encontrado.`,true);return;}
  const name=clientes[idx].cli;
  if (!confirm(`Excluir "${name}" (ID: ${id})?`))return;
  clientes.splice(idx,1); closeModal('del'); renderTable(); showToast(`Cliente "${name}" excluído.`);
}

function previewRenew() {
  const id=parseInt(document.getElementById('ren-id').value);
  const c=clientes.find(c=>c.id===id);
  const prev=document.getElementById('ren-preview');
  if (c) {
    prev.textContent=`${c.cli} — Data atual: ${c.dt} | Prazo: ${c.prazo} dias`;
    document.getElementById('ren-dt').value=formatDate(new Date());
    document.getElementById('ren-prazo').value=c.prazo;
  } else { prev.textContent=''; }
}

function renewCliente() {
  const id=parseInt(document.getElementById('ren-id').value);
  const newDt=document.getElementById('ren-dt').value.trim();
  const newPr=parseInt(document.getElementById('ren-prazo').value)||30;
  const c=clientes.find(c=>c.id===id);
  if (!c){showToast(`ID ${id} não encontrado.`,true);return;}
  if (!parseDate(newDt)){showToast('Data inválida. Use DD/MM/AAAA.',true);return;}
  c.dt=newDt; c.prazo=newPr; closeModal('renew'); renderTable(); showToast(`"${c.cli}" renovado!`);
}

function openEdit(idx) {
  const c = clientes[idx];
  if (!c) return;
  document.getElementById('edit-idx').value = idx;
  document.getElementById('edit-cli').value = c.cli || '';
  document.getElementById('edit-phone').value = c.phone || '';
  document.getElementById('edit-resp').value = c.resp || '';
  document.getElementById('edit-dt').value = c.dt || '';
  document.getElementById('edit-prazo').value = c.prazo || 30;
  openModal('edit');
}

function saveEdit() {
  const idx = parseInt(document.getElementById('edit-idx').value);
  const cli = document.getElementById('edit-cli').value.trim().toUpperCase();
  const phone = document.getElementById('edit-phone').value.trim().replace(/\D/g,'');
  const resp = document.getElementById('edit-resp').value.trim().toUpperCase();
  const dt = document.getElementById('edit-dt').value.trim();
  const prazo = parseInt(document.getElementById('edit-prazo').value) || 30;
  if (!cli) { showToast('Nome é obrigatório.', true); return; }
  if (dt && !parseDate(dt)) { showToast('Data inválida. Use DD/MM/AAAA.', true); return; }
  clientes[idx] = { ...clientes[idx], cli, phone, resp, dt: dt || clientes[idx].dt, prazo };
  closeModal('edit');
  renderTable();
  showToast(`✅ Cliente "${cli}" atualizado!`);
}

function showToast(msg, isError=false) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.className='toast show'+(isError?' error':'');
  setTimeout(()=>t.classList.remove('show'),3000);
}

function exportCSV() {
  const rows=[['ID','RESPONSÁVEL','CLIENTE','WHATSAPP','DATA PAGAMENTO','PRAZO DIAS','DATA VENCIMENTO','DIAS A VENCER','STATUS']];
  clientes.forEach(c=>{
    const venc=getVencimento(c.dt,c.prazo);
    const dias=daysDiff(venc);
    const st=getStatus(dias);
    rows.push([c.id,c.resp,c.cli,c.phone||'',c.dt,c.prazo,venc,dias??'',st.label]);
  });
  const csv=rows.map(r=>r.join(';')).join('\n');
  const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='clientes_'+formatDate(new Date()).replace(/\//g,'-')+'.csv';
  a.click();
}
